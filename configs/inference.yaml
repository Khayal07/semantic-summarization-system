# Inference Configuration
# Settings for model inference and generation

inference:
  # Decoding strategy
  decoding:
    strategy: beam_search  # Options: greedy, beam_search, top_k, top_p
    num_beams: 4
    early_stopping: true
    length_penalty: 2.0
    
  # Generation parameters
  generation:
    max_length: 128
    min_length: 30
    repetition_penalty: 2.5
    length_penalty: 2.0
    diversity_penalty: 0.0
    
  # Input processing
  input:
    max_source_length: 512
    truncation_strategy: longest_first
    padding: longest
    add_special_tokens: true
    
  # Output processing
  output:
    skip_special_tokens: true
    clean_up_tokenization_spaces: true

# Batch processing
batching:
  batch_size: 16
  max_batch_timeout_seconds: 30
  dynamic_batching: true

# Device configuration
device:
  cuda_available: true
  gpu_id: 0  # For multi-GPU setups
  memory_fraction: 0.9  # Use 90% of GPU memory

# Optimization
optimization:
  quantization: false  # Enable quantization for faster inference
  distillation: false  # Use knowledge distillation
  pruning: false  # Model pruning for efficiency
